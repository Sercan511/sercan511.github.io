<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danke für dein Feedback! — Sercan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>"
        type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        .thankyou-card {
            text-align: center;
            max-width: 560px;
            background: rgba(18, 18, 42, 0.6);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(108, 60, 224, 0.2);
            border-radius: 20px;
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease;
        }

        .thankyou-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(135deg, #6c3ce0, #00d4aa);
        }

        .emoji-big {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounceIn 0.8s ease 0.3s both;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            margin-bottom: 12px;
            animation: fadeUp 0.6s ease 0.5s both;
        }

        .gradient-text {
            background: linear-gradient(135deg, #6c3ce0, #00d4aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8888a8;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 32px;
            animation: fadeUp 0.6s ease 0.7s both;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(135deg, #6c3ce0, #00d4aa);
            margin: 0 auto 28px;
            animation: fadeUp 0.6s ease 0.8s both;
        }

        .hint-box {
            background: rgba(108, 60, 224, 0.1);
            border: 1px solid rgba(108, 60, 224, 0.2);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 28px;
            animation: fadeUp 0.6s ease 0.9s both;
        }

        .hint-box p {
            color: #9d7af5;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .hint-box .arrow {
            font-size: 1.5rem;
            display: block;
            margin-top: 8px;
            animation: bounce 1.5s ease infinite;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #6c3ce0, #00d4aa);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: 0.4s ease;
            animation: fadeUp 0.6s ease 1s both;
        }

        .back-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 12px 40px rgba(108, 60, 224, 0.4);
        }

        /* Background shapes */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
        }

        .bg-shape-1 {
            width: 400px; height: 400px;
            background: #6c3ce0;
            top: -150px; right: -100px;
        }

        .bg-shape-2 {
            width: 300px; height: 300px;
            background: #00d4aa;
            bottom: -100px; left: -100px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    </style>
</head>

<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <div class="thankyou-card">
        <div class="emoji-big">🎉</div>
        <h1>Vielen <span class="gradient-text">Dank!</span></h1>
        <p class="subtitle">Dein Feedback wurde erfolgreich gesendet.<br>Ich freue mich sehr über deine Rückmeldung!</p>
        <div class="divider"></div>
        <div class="hint-box">
            <p>💡 <strong>Tipp:</strong> Hast du schon dein persönliches Zertifikat erstellt?<br>Scroll auf der Hauptseite zum <strong>„Vielen Dank"</strong>-Bereich!</p>
            <span class="arrow">👇</span>
        </div>
        <a href="index.html#danke" class="back-btn">
            ← Zurück zum Portfolio
        </a>
    </div>
</body>

</html>
